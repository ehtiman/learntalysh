<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>LearnTalysh</title>
    <script type="text/javascript">
      // This script handles the GitHub Pages 404 Redirect
      var pathSegmentsToKeep = 1; // Set to 1 because your project is at /learntalysh/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    </body>
</html>
